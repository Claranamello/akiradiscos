<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akira Discos | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div id="logo">
            <img class="img" src="imagens/Akira.svg" alt="Discos de Vinil">
            <img id="titulo" src="imagens/AkiraTitulo.svg" alt="Akira Discos">
        </div>

        <a href="produtos.html" class="campo">
            <p>Pesquise seu vinil aqui...</p>
        </a>

        <div class="header-menu">
            <a class="icone" href="cadastro.html">
                <img src="imagens/conta.svg" alt="Login">
            </a>
            <a class="icone" href="carrinho.html">
                <img src="imagens/carrinho.svg" alt="Carrinho">
            </a>
        </div>
    </header>

    <main>
        <section id="promo">
            <div class="banner">
                <a href="produtos.html">Confira as Novidades</a>
            </div>
            <div class="bot">
                <h3>Destaque da Semana</h3>
                <button href = "produtos.html" class = "botao">Confira!</button>
            </div>
        </section>

        <section id="categorias">
            <a href="produtos.html?categoria=sucessos" class="card-categoria card-sucessos">
                <span>Mais Vendidos</span>
             </a>
            <a href="produtos.html?categoria=pop" class="card-categoria card-pop">
                <span>Pop</span>
            </a>
            <a href="produtos.html?categoria=rock" class="card-categoria card-rock">
                <span>Rock</span>
            </a>
            <a href="produtos.html?categoria=taylor" class="card-categoria card-taylor">
                <span>Taylor Swift</span>
            </a>
            <a href="produtos.html?categoria=mpb" class="card-categoria card-mpb">
                <span>MPB</span>
            </a>
            <a href="produtos.html?categoria=hiphop" class="card-categoria card-hiphop">
                <span>Hip-Hop</span>
            </a>
            <a href="produtos.html?categoria=classicos" class="card-categoria card-classicos">
                <span>Clássicos</span>
            </a>
            <a href="produtos.html?categoria=novidades" class="card-categoria card-novidades">
                <span>Novidades</span>
            </a>
        </section>

        <section id="info">
            <p>Frete grátis para compras acima de R$ 300</p>
        </section>
    </main>

     <footer>

        <div id="rodape">

            <img src="imagens/AkiraTitulo.svg" alt="Akira">

            <p>

                A música merece mais do que streaming.

            </p>

        </div>

    </footer>
</body>
</html>
